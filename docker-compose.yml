version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: logistics_db_container
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: logistics_db
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+07:00
    volumes:
      # Nơi lưu trữ data cứng
      - mysql_data:/var/lib/mysql
      
      # TỰ ĐỘNG INIT DATABASE: Gắn các file SQL vào thư mục khởi tạo của MySQL
      # - ./database/schema/01_create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql
      # - ./database/seed/02_seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql
      # - ./database/procedures/03_procedures_triggers.sql:/docker-entrypoint-initdb.d/03_procedures_triggers.sql
      - ./logistics_system_full.sql:/docker-entrypoint-initdb.d/logistic_system_fulls.sql
volumes:
  mysql_data: